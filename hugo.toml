baseURL = "https://wpclawai.com/"
languageCode = "zh-cn"
defaultContentLanguage = "zh"
title = "BeastXA Lab"
theme = "PaperMod"
paginate = 10

[params]
  env = "production"
  description = "AI 工具实测 · 跨境电商实战 · 冷门机会挖掘"
  author = "BeastXA"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  comments = false

  [params.homeInfoParams]
    Title = "BeastXA Lab"
    Content = "AI 工具实测 · 跨境电商实战 · 冷门机会挖掘"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/beastxa6-668"

  [[params.socialIcons]]
    name = "x"
    url = "https://x.com/beastxa6"

[params.assets]
  favicon = "/favicon.ico"

[params.fuseOpts]
  isCaseSensitive = false
  shouldSort = true
  location = 0
  distance = 1000
  threshold = 0.4
  minMatchCharLength = 0
  keys = ["title", "permalink", "summary", "content"]

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    noClasses = false

[[menu.main]]
  identifier = "ai-tools"
  name = "AI 工具"
  url = "/categories/ai-tools/"
  weight = 10

[[menu.main]]
  identifier = "ecommerce"
  name = "跨境电商"
  url = "/categories/ecommerce/"
  weight = 20

[[menu.main]]
  identifier = "opportunities"
  name = "冷门机会"
  url = "/categories/opportunities/"
  weight = 30

[[menu.main]]
  identifier = "search"
  name = "搜索"
  url = "/search/"
  weight = 40
