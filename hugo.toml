baseURL = "https://wpclawai.com/"
title = "BeastXA Lab"
theme = "PaperMod"
paginate = 10
defaultContentLanguage = "zh"
defaultContentLanguageInSubdir = false

[languages]
  [languages.zh]
    languageName = "中文"
    weight = 1
    languageCode = "zh-CN"
    [languages.zh.params]
      description = "AI 工具实测 · 跨境电商实战 · 冷门机会挖掘"
      [languages.zh.params.homeInfoParams]
        Title = "BeastXA Lab"
        Content = "AI 工具实测 · 跨境电商实战 · 冷门机会挖掘"
    [[languages.zh.menu.main]]
      identifier = "ai-tools"
      name = "AI 工具"
      url = "/categories/ai-tools/"
      weight = 10
    [[languages.zh.menu.main]]
      identifier = "ecommerce"
      name = "跨境电商"
      url = "/categories/ecommerce/"
      weight = 20
    [[languages.zh.menu.main]]
      identifier = "opportunities"
      name = "冷门机会"
      url = "/categories/opportunities/"
      weight = 30
    [[languages.zh.menu.main]]
      identifier = "search"
      name = "搜索"
      url = "/search/"
      weight = 40

  [languages.en]
    languageName = "English"
    weight = 2
    languageCode = "en"
    [languages.en.params]
      description = "AI Tool Reviews · Cross-border E-commerce · Hidden Opportunities"
      [languages.en.params.homeInfoParams]
        Title = "BeastXA Lab"
        Content = "AI Tool Reviews · Cross-border E-commerce · Hidden Opportunities"
    [[languages.en.menu.main]]
      identifier = "ai-tools"
      name = "AI Tools"
      url = "/en/categories/ai-tools/"
      weight = 10
    [[languages.en.menu.main]]
      identifier = "ecommerce"
      name = "E-commerce"
      url = "/en/categories/ecommerce/"
      weight = 20
    [[languages.en.menu.main]]
      identifier = "opportunities"
      name = "Opportunities"
      url = "/en/categories/opportunities/"
      weight = 30
    [[languages.en.menu.main]]
      identifier = "search"
      name = "Search"
      url = "/en/search/"
      weight = 40

[params]
  env = "production"
  author = "BeastXA"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  comments = false

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/beastxa6-668"

  [[params.socialIcons]]
    name = "x"
    url = "https://x.com/beastxa6"

[params.assets]
  favicon = "/favicon.ico"

[params.fuseOpts]
  isCaseSensitive = false
  shouldSort = true
  location = 0
  distance = 1000
  threshold = 0.4
  minMatchCharLength = 0
  keys = ["title", "permalink", "summary", "content"]

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    noClasses = false
